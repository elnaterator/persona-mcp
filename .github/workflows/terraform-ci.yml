# Terraform CI — lint, security scan, and plan validation for infrastructure changes.
#
# !! NO terraform apply STEPS EXIST IN THIS WORKFLOW !!
# All jobs are strictly read-only. Infrastructure changes are applied MANUALLY
# by the developer following the runbook at specs/010-aws-infra/quickstart.md.
#
# Jobs:
#   terraform-lint-scan  Format check (terraform fmt) + Checkov security scan.
#                        No AWS credentials required.
#   terraform-plan       terraform init + plan for both dev and prod (read-only
#                        AWS access via OIDC). Runs only after lint-scan passes.
#
# PREREQUISITES — set these GitHub repository secrets before terraform-plan
# can authenticate to AWS:
#   TF_PLAN_ROLE_DEV   ARN of the github-actions-terraform-dev IAM role
#   TF_PLAN_ROLE_PROD  ARN of the github-actions-terraform-prod IAM role
# See specs/010-aws-infra/quickstart.md (Prerequisites Step 4) for OIDC setup.

name: Terraform CI

on:
  pull_request:
    paths:
      - "infra/**"

jobs:
  terraform-lint-scan:
    name: Lint & Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive infra/

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Checkov security scan
        run: uvx checkov -d infra/ --quiet --compact

  terraform-plan:
    name: Plan (${{ matrix.environment }})
    runs-on: ubuntu-latest
    needs: terraform-lint-scan
    timeout-minutes: 10

    strategy:
      matrix:
        environment: [dev, prod]

    permissions:
      id-token: write   # required for OIDC token exchange
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ matrix.environment == 'dev' && secrets.TF_PLAN_ROLE_DEV || secrets.TF_PLAN_ROLE_PROD }}
          aws-region: us-west-2

      - name: Terraform init
        run: terraform -chdir=infra/${{ matrix.environment }} init

      - name: Terraform plan
        run: terraform -chdir=infra/${{ matrix.environment }} plan -no-color
